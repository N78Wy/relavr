<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relavr WebRTC Viewer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #00d9ff; }
        .config { background: #16213e; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; }
        .field { display: flex; flex-direction: column; gap: 5px; }
        .field label { font-size: 12px; color: #888; }
        .field input { padding: 10px 14px; border: 1px solid #333; border-radius: 4px; background: #0f0f23; color: #fff; font-size: 14px; min-width: 200px; }
        .field input:focus { outline: none; border-color: #00d9ff; }
        button { padding: 10px 20px; background: #00d9ff; color: #000; border: none; border-radius: 4px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        button:hover { background: #00b8d9; }
        button:disabled { background: #444; color: #666; cursor: not-allowed; }
        button.disconnect { background: #ff4757; }
        button.disconnect:hover { background: #ff3838; }
        .main { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }
        @media (max-width: 900px) { .main { grid-template-columns: 1fr; } }
        .video-container { background: #16213e; border-radius: 8px; overflow: hidden; position: relative; }
        .video-container video { width: 100%; display: block; background: #000; }
        .video-placeholder { aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; color: #666; font-size: 14px; }
        .status-badge { position: absolute; top: 10px; left: 10px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-badge.connecting { background: #ffa502; color: #000; }
        .status-badge.connected { background: #2ed573; color: #000; }
        .status-badge.disconnected { background: #ff4757; color: #fff; }
        .status-badge.error { background: #ff4757; color: #fff; }
        .panel { background: #16213e; border-radius: 8px; padding: 15px; }
        .panel h2 { font-size: 14px; color: #888; margin-bottom: 10px; text-transform: uppercase; }
        .logs { height: 400px; overflow-y: auto; font-family: 'Monaco', 'Menlo', monospace; font-size: 11px; line-height: 1.6; }
        .logs::-webkit-scrollbar { width: 6px; }
        .logs::-webkit-scrollbar-track { background: #0f0f23; }
        .logs::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        .log { padding: 3px 0; }
        .log .time { color: #666; }
        .log.sent { color: #ffa502; }
        .log.received { color: #2ed573; }
        .log.info { color: #00d9ff; }
        .log.error { color: #ff4757; }
        .stats { margin-top: 15px; padding-top: 15px; border-top: 1px solid #333; }
        .stat { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 0; }
        .stat-label { color: #888; }
        .stat-value { color: #fff; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Relavr WebRTC Viewer</h1>
        
        <div class="config">
            <div class="field">
                <label>信令服务器地址</label>
                <input type="text" id="signalingUrl" value="ws://localhost:8765" placeholder="ws://host:port">
            </div>
            <div class="field">
                <label>会话 ID</label>
                <input type="text" id="sessionId" value="test-session" placeholder="session-id">
            </div>
            <button id="connectBtn" onclick="connect()">连接</button>
            <button id="disconnectBtn" class="disconnect" onclick="disconnect()" disabled>断开</button>
        </div>

        <div class="main">
            <div class="video-container">
                <div id="videoPlaceholder" class="video-placeholder">等待视频流...</div>
                <video id="remoteVideo" autoplay playsinline style="display: none;"></video>
                <div id="statusBadge" class="status-badge disconnected">未连接</div>
            </div>

            <div class="panel">
                <h2>连接日志</h2>
                <div id="logs" class="logs"></div>
                <div class="stats">
                    <div class="stat">
                        <span class="stat-label">连接状态</span>
                        <span id="connState" class="stat-value">-</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">ICE 状态</span>
                        <span id="iceState" class="stat-value">-</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">视频轨道</span>
                        <span id="videoTrack" class="stat-value">-</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let pc = null;
        const video = document.getElementById('remoteVideo');
        const placeholder = document.getElementById('videoPlaceholder');
        const statusBadge = document.getElementById('statusBadge');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const logsEl = document.getElementById('logs');

        function log(type, message) {
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.innerHTML = `<span class="time">[${time}]</span> ${message}`;
            logsEl.appendChild(div);
            logsEl.scrollTop = logsEl.scrollHeight;
        }

        function escapeJson(str) {
            return str.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\n/g, '\\n').replace(/\r/g, '\\r').replace(/\t/g, '\\t');
        }

        function encodeMessage(msg) {
            const parts = [`"type":"${msg.type}"`, `"sessionId":"${msg.sessionId}"`];
            if (msg.role) parts.push(`"role":"${msg.role}"`);
            if (msg.sdp) parts.push(`"sdp":"${escapeJson(msg.sdp)}"`);
            if (msg.candidate !== undefined) parts.push(`"candidate":"${escapeJson(msg.candidate)}"`);
            if (msg.sdpMid) parts.push(`"sdpMid":"${msg.sdpMid}"`);
            if (msg.sdpMLineIndex !== undefined) parts.push(`"sdpMLineIndex":${msg.sdpMLineIndex}`);
            return `{${parts.join(',')}}`;
        }

        function parseMessage(text) {
            const result = {};
            let i = 1;
            while (i < text.length && text[i] !== '}') {
                while (text[i] === ' ' || text[i] === '\n') i++;
                if (text[i] !== '"') break;
                i++;
                let key = '';
                while (text[i] !== '"') key += text[i++];
                i++;
                while (text[i] !== ':') i++;
                i++;
                while (text[i] === ' ') i++;
                let value = '';
                if (text[i] === '"') {
                    i++;
                    while (text[i] !== '"' || text[i - 1] === '\\') {
                        value += text[i];
                        i++;
                    }
                    i++;
                } else {
                    while (text[i] !== ',' && text[i] !== '}') {
                        value += text[i];
                        i++;
                    }
                }
                result[key] = value;
                while (text[i] === ' ' || text[i] === ',') i++;
            }
            return result;
        }

        function setStatus(status, text) {
            statusBadge.className = `status-badge ${status}`;
            statusBadge.textContent = text;
        }

        function connect() {
            const url = document.getElementById('signalingUrl').value;
            const sessionId = document.getElementById('sessionId').value;

            if (!url || !sessionId) {
                alert('请输入信令服务器地址和会话 ID');
                return;
            }

            connectBtn.disabled = true;
            disconnectBtn.disabled = false;
            setStatus('connecting', '连接中...');
            log('info', `正在连接 ${url}`);

            ws = new WebSocket(url);

            ws.onopen = () => {
                log('info', 'WebSocket 已连接');
                setStatus('connecting', '加入会话...');
                const msg = { type: 'join', sessionId, role: 'receiver' };
                log('sent', '→ join(receiver)');
                ws.send(encodeMessage(msg));
            };

            ws.onmessage = async (event) => {
                const msg = parseMessage(event.data);
                log('received', `← ${msg.type}`);

                if (msg.type === 'offer') {
                    log('info', '收到 Offer，创建 Answer');
                    await handleOffer(msg);
                } else if (msg.type === 'ice-candidate') {
                    await handleIceCandidate(msg);
                } else if (msg.type === 'leave') {
                    log('info', '发送端已离开');
                    disconnect();
                } else if (msg.type === 'error') {
                    log('error', `错误: ${msg.message}`);
                    setStatus('error', '错误');
                }
            };

            ws.onclose = () => {
                log('info', 'WebSocket 已断开');
                if (pc) setStatus('disconnected', '已断开');
            };

            ws.onerror = (err) => {
                log('error', 'WebSocket 错误');
                setStatus('error', '连接失败');
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
            };

            pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });

            pc.onconnectionstatechange = () => {
                document.getElementById('connState').textContent = pc.connectionState;
                if (pc.connectionState === 'connected') {
                    setStatus('connected', '已连接');
                } else if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
                    setStatus('disconnected', '已断开');
                }
            };

            pc.oniceconnectionstatechange = () => {
                document.getElementById('iceState').textContent = pc.iceConnectionState;
            };

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    const msg = {
                        type: 'ice-candidate',
                        sessionId,
                        candidate: event.candidate.candidate,
                        sdpMid: event.candidate.sdpMid || '',
                        sdpMLineIndex: event.candidate.sdpMLineIndex || 0
                    };
                    log('sent', '→ ice-candidate');
                    ws.send(encodeMessage(msg));
                }
            };

            pc.ontrack = (event) => {
                log('info', `收到 ${event.track.kind} 轨道`);
                document.getElementById('videoTrack').textContent = `${event.track.kind} (${event.track.id.slice(0, 8)})`;
                if (event.track.kind === 'video') {
                    video.srcObject = event.streams[0];
                    video.style.display = 'block';
                    placeholder.style.display = 'none';
                }
            };
        }

        async function handleOffer(msg) {
            await pc.setRemoteDescription({ type: 'offer', sdp: msg.sdp });
            pc.addTransceiver('video', { direction: 'recvonly' });

            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);

            const answerMsg = { type: 'answer', sessionId: document.getElementById('sessionId').value, sdp: answer.sdp };
            log('sent', '→ answer');
            ws.send(encodeMessage(answerMsg));
        }

        async function handleIceCandidate(msg) {
            await pc.addIceCandidate({
                candidate: msg.candidate,
                sdpMid: msg.sdpMid,
                sdpMLineIndex: parseInt(msg.sdpMLineIndex)
            });
        }

        function disconnect() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const msg = { type: 'leave', sessionId: document.getElementById('sessionId').value };
                log('sent', '→ leave');
                ws.send(encodeMessage(msg));
            }
            if (pc) {
                pc.close();
                pc = null;
            }
            if (ws) {
                ws.close();
                ws = null;
            }
            video.srcObject = null;
            video.style.display = 'none';
            placeholder.style.display = 'flex';
            setStatus('disconnected', '未连接');
            connectBtn.disabled = false;
            disconnectBtn.disabled = true;
            document.getElementById('connState').textContent = '-';
            document.getElementById('iceState').textContent = '-';
            document.getElementById('videoTrack').textContent = '-';
        }

        window.onbeforeunload = () => disconnect();
    </script>
</body>
</html>
